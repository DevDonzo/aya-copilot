services:
  aya:
    container_name: aya-copilot
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/aya.env
    environment:
      PORT: "3010"
      AYA_DATA_DIR: /app/data
      LIBRECHAT_MONGO_DB_NAME: LibreChat
    ports:
      - "127.0.0.1:3010:3010"
    volumes:
      - /srv/aya/aya:/app/data
    depends_on:
      - mongodb
    networks:
      aya_private:
        aliases:
          - aya-api
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3010/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  librechat:
    container_name: librechat
    build:
      context: ../../../librechat
      dockerfile: Dockerfile.multi
      target: api-build
    restart: unless-stopped
    env_file:
      - ./env/librechat.env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      MEILI_HOST: http://meilisearch:7700
    depends_on:
      - mongodb
      - meilisearch
      - aya
    ports:
      - "127.0.0.1:3080:3080"
    volumes:
      - ./config/librechat.yaml:/app/librechat.yaml:ro
      - /srv/aya/librechat/uploads:/app/uploads
      - /srv/aya/librechat/logs:/app/api/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aya_private

  mongodb:
    container_name: aya-chat-mongodb
    image: mongo:8.0.20
    restart: unless-stopped
    command: mongod --auth
    env_file:
      - ./env/librechat.env
    volumes:
      - /srv/aya/mongodb:/data/db
    networks:
      - aya_private

  meilisearch:
    container_name: aya-chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: unless-stopped
    env_file:
      - ./env/librechat.env
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - /srv/aya/meilisearch:/meili_data
    networks:
      - aya_private

networks:
  aya_private:
    driver: bridge
