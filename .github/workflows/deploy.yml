name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/copilot/package-lock.json
            apps/librechat/package-lock.json

      - name: Install Aya dependencies
        working-directory: apps/copilot
        run: npm ci

      - name: Test Aya backend
        working-directory: apps/copilot
        run: npm test

      - name: Build Aya backend
        working-directory: apps/copilot
        run: npm run build

      - name: Install LibreChat dependencies
        working-directory: apps/librechat
        run: npm ci

      - name: Build LibreChat integration packages
        working-directory: apps/librechat
        run: |
          npm run build:data-provider
          npm run build:data-schemas
          npm run build:client-package
          npm run build:api
          npm run build:client
          npm run test:api
          npm run test:client

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Test blue-cli
        working-directory: tools/blue-cli
        run: |
          go test ./...
          go build ./...

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.21.222
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -eu
            cd ~/Blue
            LEGACY_DEPLOY_DIR="apps/aya-ops-bot/deploy/hostinger"
            DEPLOY_DIR="apps/copilot/deploy/hostinger"
            RUNTIME_BACKUP="/tmp/aya-copilot-runtime"
            rm -rf "$RUNTIME_BACKUP"
            if [ -d "$LEGACY_DEPLOY_DIR" ]; then
              mkdir -p "$RUNTIME_BACKUP"
              [ -d "$LEGACY_DEPLOY_DIR/env" ] && cp -a "$LEGACY_DEPLOY_DIR/env" "$RUNTIME_BACKUP/env"
              [ -d "$LEGACY_DEPLOY_DIR/data" ] && cp -a "$LEGACY_DEPLOY_DIR/data" "$RUNTIME_BACKUP/data"
              if [ -f "$LEGACY_DEPLOY_DIR/config/librechat.yaml" ]; then
                mkdir -p "$RUNTIME_BACKUP/config"
                cp -a "$LEGACY_DEPLOY_DIR/config/librechat.yaml" "$RUNTIME_BACKUP/config/librechat.yaml"
              fi
            fi
            git fetch origin main
            git reset --hard origin/main
            cd "$DEPLOY_DIR"
            if [ -d "$RUNTIME_BACKUP/env" ]; then
              mkdir -p env
              for env_file in "$RUNTIME_BACKUP"/env/*; do
                [ -e "$env_file" ] || continue
                target="env/$(basename "$env_file")"
                [ -e "$target" ] || cp -a "$env_file" "$target"
              done
            fi
            [ -d "$RUNTIME_BACKUP/data" ] && [ ! -d data ] && cp -a "$RUNTIME_BACKUP/data" data
            if [ -f "$RUNTIME_BACKUP/config/librechat.yaml" ] && [ ! -f config/librechat.yaml ]; then
              mkdir -p config
              cp -a "$RUNTIME_BACKUP/config/librechat.yaml" config/librechat.yaml
            fi
            if [ -f config/librechat.yaml ]; then
              perl -0pi -e 's/aya-ops-assistant/aya-copilot-assistant/g; s/Aya Ops/Aya Copilot/g; s/Aya Financial Assistant/Aya Copilot Assistant/g' config/librechat.yaml
            fi
            docker compose up -d --build --remove-orphans
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3010/health >/dev/null; then
                break
              fi
              if [ "$i" -eq 30 ]; then
                docker compose logs --tail=120 aya
                exit 1
              fi
              sleep 2
            done
            for i in $(seq 1 30); do
              if curl -fsSI http://127.0.0.1:3080 >/dev/null; then
                break
              fi
              if [ "$i" -eq 30 ]; then
                docker compose logs --tail=120 librechat
                exit 1
              fi
              sleep 2
            done
            docker compose ps

      - name: Verify public production surface
        run: node scripts/verify_production.mjs
